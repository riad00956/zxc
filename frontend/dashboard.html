<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - ᴏʀɪɴɢᴇ ᴘʀɪɴᴛ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff8c00; --bg: #050200; --glass: rgba(255, 140, 0, 0.05); }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; min-height: 100vh; display: flex; flex-direction: column; }
        .fiber-bg { position: fixed; inset: 0; z-index: -1; background: var(--bg); }
        .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.4; animation: float 8s infinite alternate ease-in-out; }
        .orb-1 { width: 35vw; height: 35vw; background: #ff8c00; top: -10%; left: -10%; } .orb-2 { width: 45vw; height: 45vw; background: #ff4500; bottom: -10%; right: -10%; animation-delay: -4s; }
        .fiber { position: absolute; width: 2px; height: 100vh; background: linear-gradient(transparent, #ff8c00, transparent); opacity: 0; animation: flow 3s infinite linear; }
        .f1 { left: 15%; animation-delay: 0.2s; } .f2 { left: 50%; animation-delay: 1.5s; height: 120vh; } .f3 { left: 85%; animation-delay: 2.8s; }
        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(40px, 40px); } }
        @keyframes flow { 0% { transform: translateY(-100%); opacity: 0; } 50% { opacity: 1; box-shadow: 0 0 20px #ff8c00; } 100% { transform: translateY(100%); opacity: 0; } }

        .container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; z-index: 1; }
        .card { width: 100%; max-width: 450px; background: var(--glass); border: 1px solid rgba(255,140,0,0.2); border-radius: 25px; padding: 30px; backdrop-filter: blur(25px); box-shadow: 0 20px 40px rgba(0,0,0,0.5); animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes zoomIn { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
        h2 { text-align: center; color: #ffca80; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .status-dot { width: 12px; height: 12px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .info-box { display: flex; justify-content: space-between; background: rgba(255,140,0,0.1); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px dashed rgba(255,140,0,0.3); }
        .info-box span { font-size: 0.8rem; color: rgba(255,255,255,0.6); display: block; margin-bottom: 5px; } .info-box b { color: var(--primary); font-size: 1.1rem; }
        label { display: block; margin-bottom: 8px; color: var(--primary); font-size: 0.85rem; font-weight: 600; }
        textarea { width: 100%; padding: 15px; background: rgba(20, 10, 0, 0.6); border: 1px solid rgba(255,140,0,0.3); border-radius: 15px; color: #fff; box-sizing: border-box; outline: none; font-family: inherit; transition: 0.3s; margin-bottom: 15px; }
        textarea:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(255, 140, 0, 0.3); }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
        button { flex: 1; min-width: 45%; padding: 14px; border: none; border-radius: 12px; color: #fff; font-weight: bold; cursor: pointer; transition: 0.3s; background: linear-gradient(135deg, #ff8c00, #ff4500); }
        button:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(255, 69, 0, 0.4); }
        .btn-stop { background: #1a0a00; border: 1px solid #ff4444; color: #ff4444; } .btn-stop:hover { background: #ff4444; color: white; box-shadow: 0 8px 15px rgba(255, 68, 68, 0.4); }
        .btn-logout { flex-basis: 100%; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); margin-top: 5px; } .btn-logout:hover { background: rgba(255,255,255,0.1); color: white; transform: none; box-shadow: none; }
    </style>
</head>
<body>
    <div class="fiber-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="fiber f1"></div><div class="fiber f2"></div><div class="fiber f3"></div></div>
    
    <div id="header-part"></div>

    <div class="container">
        <div class="card" id="dashCard">
            <h2><div class="status-dot" id="dot"></div> Control Panel</h2>
            <div class="info-box">
                <div><span>Status</span><b id="statusText" style="color:#00ff88">Active</b></div>
                <div style="text-align: right;"><span>Connected ID</span><b>7729103</b></div>
            </div>
            <label>Custom Auto-Reply Message</label>
            <textarea id="replyText" rows="3">I'm currently offline. Will reply soon!</textarea>
            <div class="btn-group">
                <button onclick="saveReply()">💾 Save Reply</button>
                <button id="toggleBtn" class="btn-stop" onclick="toggleBot()">⏸️ Stop Bot</button>
                <button class="btn-logout" onclick="logout()">🚪 Logout Session</button>
            </div>
        </div>
    </div>

    <div id="footer-part"></div>

    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            document.getElementById('header-part').innerHTML = await (await fetch('header.html')).text();
            document.getElementById('footer-part').innerHTML = await (await fetch('footer.html')).text();
        });

        function saveReply() {
            const btn = document.querySelector('button');
            btn.innerHTML = "✅ Saved!"; btn.style.background = "#00ff88"; btn.style.color = "#000";
            setTimeout(() => { btn.innerHTML = "💾 Save Reply"; btn.style.background = "linear-gradient(135deg, #ff8c00, #ff4500)"; btn.style.color = "#fff"; }, 2000);
        }
        function toggleBot() {
            const btn = document.getElementById('toggleBtn'); const st = document.getElementById('statusText'); const dot = document.getElementById('dot');
            if(st.innerText === "Active") {
                st.innerText = "Paused"; st.style.color = "#ff4444"; dot.style.background = "#ff4444"; dot.style.boxShadow = "0 0 10px #ff4444"; dot.style.animation = "none";
                btn.innerHTML = "▶️ Start Bot"; btn.style.background = "rgba(0, 255, 136, 0.1)"; btn.style.borderColor = "#00ff88"; btn.style.color = "#00ff88";
            } else {
                st.innerText = "Active"; st.style.color = "#00ff88"; dot.style.background = "#00ff88"; dot.style.boxShadow = "0 0 10px #00ff88"; dot.style.animation = "blink 1.5s infinite";
                btn.innerHTML = "⏸️ Stop Bot"; btn.style.background = "#1a0a00"; btn.style.borderColor = "#ff4444"; btn.style.color = "#ff4444";
            }
        }
        function logout() {
            document.getElementById('dashCard').style.animation = "zoomIn 0.4s reverse forwards";
            setTimeout(() => location.href = 'logout.html', 400);
        }
    </script>
</body>
</html>
